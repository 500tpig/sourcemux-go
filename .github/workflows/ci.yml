name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...
